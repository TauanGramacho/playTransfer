<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Conectando...</title>
  <style>
    body { background: #080B14; color: #F1F5F9; font-family: 'Inter', sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(124,58,237,0.3);
               border-top-color: #7C3AED; border-radius: 50%; animation: spin 0.8s linear infinite;
               margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #64748B; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Finalizando conexão...</p>
</div>
<script>
  // Lê parâmetros da URL e envia pro opener (popup → janela principal)
  const params = new URLSearchParams(window.location.search);
  const sid         = params.get('sid')          || '';
  const role        = params.get('role')         || 'src';
  const displayName = params.get('display_name') || '';
  const platform    = params.get('platform')     || '';
  const error       = params.get('error')        || '';

  if (window.opener) {
    window.opener.postMessage(
      { type: 'oauth_done', sid, role, displayName, platform, error },
      window.location.origin
    );
    window.close();
  } else {
    // Se não há opener (navegação direta), redireciona pra home com params
    window.location.href = `/?oauth=1&sid=${sid}&role=${role}&display_name=${displayName}&platform=${platform}`;
  }
</script>
</body>
</html>
